name: CI / Release

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose

  npm-tests:
    name: npm package tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run Node tests
        # Covers scripts/prepare-npm.js + npm/rag-cli/src/platform.js
        run: node --test test/npm-platform.test.js test/prepare-npm.test.js

  build-cuda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.27
        with:
          cuda: "12.6.3"
          method: network
          sub-packages: '["nvcc", "cudart-dev", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcublas-dev", "libcurand-dev"]'
      - name: Check CUDA crate compiles
        run: cargo check -p rag-cli-cuda --verbose
        env:
          CUDA_COMPUTE_CAP: "80"

  publish:
    name: Publish to crates.io
    needs: [build, build-cuda, npm-tests]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write # Required for trusted publishing OIDC token
      contents: write # Push version bump commit and tag
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          current=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          IFS='.' read -r major minor patch <<< "$current"
          case "${{ inputs.version }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          new="${major}.${minor}.${patch}"
          sed -i "0,/^version = \".*\"/s//version = \"${new}\"/" Cargo.toml
          sed -i "0,/^version = \".*\"/s//version = \"${new}\"/" rag-cli-cuda/Cargo.toml
          sed -i "s/rag-cli = { version = \"[^\"]*\"/rag-cli = { version = \"${new}\"/" rag-cli-cuda/Cargo.toml
          echo "version=${new}" >> "$GITHUB_OUTPUT"

      - name: Update lockfile
        run: cargo update --workspace

      - name: Commit and tag
        run: |
          git add Cargo.toml rag-cli-cuda/Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push --follow-tags

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish rag-cli to crates.io
        run: cargo publish -p rag-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish rag-cli-cuda to crates.io
        run: cargo publish -p rag-cli-cuda --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  release-binaries:
    name: Release binaries
    needs: publish
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          # Platforms published to both GitHub releases AND npm.
          - os: macos-latest
            target: aarch64-apple-darwin
            release_artifact: rag-macos-aarch64
            npm_artifact: rag-aarch64-apple-darwin
            cuda: false
          - os: macos-15-intel
            target: x86_64-apple-darwin
            release_artifact: rag-macos-x86_64
            npm_artifact: rag-x86_64-apple-darwin
            cuda: false
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            release_artifact: rag-linux-x86_64
            npm_artifact: rag-x86_64-unknown-linux-gnu
            cuda: false
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            release_artifact: rag-linux-aarch64
            npm_artifact: rag-aarch64-unknown-linux-gnu
            cuda: false
          # CUDA: only ever distributed via crates.io + GitHub release (not npm).
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            release_artifact: rag-linux-x86_64-cuda
            npm_artifact: "" # not published to npm
            cuda: true
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.27
        with:
          cuda: "12.6.3"
          method: network
          sub-packages: '["nvcc", "cudart-dev", "nvrtc-dev"]'
          non-cuda-sub-packages: '["libcublas-dev", "libcurand-dev"]'

      - name: Build release binary
        run: |
          if [ "${{ matrix.cuda }}" = "true" ]; then
            cargo build --release --target ${{ matrix.target }} -p rag-cli-cuda
          else
            cargo build --release --target ${{ matrix.target }} -p rag-cli
          fi
        env:
          CUDA_COMPUTE_CAP: "80"

      - name: Package binary for GitHub release
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/rag dist/${{ matrix.release_artifact }}
          chmod +x dist/${{ matrix.release_artifact }}

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.publish.outputs.version }}
          files: dist/${{ matrix.release_artifact }}

      - name: Upload npm artifact
        # Skip CUDA — it's not in the npm matrix.
        if: matrix.npm_artifact != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_artifact }}
          path: target/${{ matrix.target }}/release/rag
          if-no-files-found: error
          retention-days: 1

  publish-npm:
    name: Publish npm packages
    needs: [publish, release-binaries]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires npm 11.5.1+. Node 24 ships
          # with a recent enough npm; earlier LTS lines do not.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # Artifact names line up with the PLATFORM_TARGETS keys used by
          # scripts/prepare-npm.js — e.g. `rag-aarch64-apple-darwin` maps
          # to `rag-cli-darwin-arm64`.
          pattern: rag-*
          merge-multiple: false

      - name: Verify artifacts look right
        run: |
          ls -la artifacts/
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            test -f "artifacts/rag-$target/rag" \
              || { echo "Missing artifact: rag-$target/rag"; exit 1; }
            file "artifacts/rag-$target/rag" || true
          done

      - name: Prepare npm packages
        run: |
          node scripts/prepare-npm.js \
            --version=${{ needs.publish.outputs.version }} \
            --artifacts=artifacts

      - name: Verify no placeholders remain
        run: |
          if grep -rn "0.0.0-PLACEHOLDER" npm/; then
            echo "prepare-npm.js left placeholder strings in npm/ — refusing to publish."
            exit 1
          fi

      # Publish platform packages FIRST so the meta package's
      # optionalDependencies resolve immediately for consumers that
      # install right after publish.
      #
      # Trusted publishing: no NODE_AUTH_TOKEN needed. npm exchanges the
      # GitHub OIDC token (granted via `id-token: write` above) for a
      # scoped publish credential. This requires:
      #   1. Each package published manually ONCE to establish it on npm.
      #   2. Trusted publisher configured for each on https://www.npmjs.com
      #      (Package → Settings → Trusted Publisher → GitHub Actions).
      #   3. The workflow filename + repo + environment must match what's
      #      configured on npm.
      #
      # `--provenance` attaches a signed attestation linking the published
      # tarball to this workflow run; appears as a badge on npm.
      - name: Publish platform packages
        run: |
          set -e
          for pkg in rag-cli-darwin-arm64 rag-cli-darwin-x64 rag-cli-linux-x64 rag-cli-linux-arm64; do
            echo "::group::Publish $pkg"
            (cd "npm/$pkg" && npm publish --access public --provenance)
            echo "::endgroup::"
          done

      - name: Publish meta package
        run: |
          cd npm/rag-cli && npm publish --access public --provenance
